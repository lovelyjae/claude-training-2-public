<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>자동화 기획 진단 · Claude Code 2차 교육</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f172a; --ink2:#1e293b; --muted:#64748b; --line:#e2e8f0;
    --brand:#4f46e5; --brand2:#7c3aed; --accent:#06b6d4;
    --ok:#10b981; --warn:#f59e0b; --bad:#ef4444; --bg:#f8fafc;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;font-family:'Pretendard',system-ui,-apple-system,sans-serif;color:var(--ink);background:linear-gradient(160deg,#eef2ff,#f8fafc 40%, #ecfeff);min-height:100%;}
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px;}
  .top{text-align:center;margin-bottom:24px;}
  .kicker{display:inline-block;background:#eef2ff;color:var(--brand);font-weight:700;font-size:13px;padding:5px 14px;border-radius:999px;}
  h1{font-size:30px;font-weight:800;letter-spacing:-0.02em;margin:14px 0 6px;}
  .sub{color:var(--muted);font-size:16px;line-height:1.6;}
  /* progress */
  .progress{display:flex;gap:6px;justify-content:center;margin:20px 0 10px;}
  .dot{width:30px;height:6px;border-radius:999px;background:#dbe1ea;transition:background .2s;}
  .dot.done{background:var(--brand);}
  .dot.cur{background:var(--brand2);}
  /* card */
  .card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 30px 80px -50px rgba(15,23,42,.4);padding:34px 30px;}
  .qnum{font-size:13px;font-weight:700;color:var(--brand);letter-spacing:0.04em;}
  .qtitle{font-size:23px;font-weight:800;letter-spacing:-0.01em;margin:6px 0 4px;line-height:1.3;}
  .qhint{color:var(--muted);font-size:14px;margin-bottom:20px;}
  .opts{display:grid;gap:12px;}
  .opt{display:flex;align-items:flex-start;gap:14px;text-align:left;background:#fff;border:2px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;transition:all .15s;font:inherit;width:100%;}
  .opt:hover{border-color:#c7d2fe;background:#f5f7ff;transform:translateY(-1px);}
  .opt .emoji{font-size:26px;line-height:1;flex-shrink:0;}
  .opt .otext{font-weight:700;font-size:16px;color:var(--ink);}
  .opt .odesc{font-weight:500;font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
  .btn{font:inherit;font-weight:700;border:none;border-radius:12px;padding:11px 20px;cursor:pointer;transition:all .15s;}
  .btn-ghost{background:transparent;color:var(--muted);}
  .btn-ghost:hover{color:var(--ink);}
  .btn-ghost:disabled{opacity:.3;cursor:not-allowed;}
  /* result */
  .verdict{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-radius:22px;padding:30px;text-align:center;margin-bottom:18px;}
  .verdict .tracklabel{font-size:14px;opacity:.85;font-weight:700;}
  .verdict .trackname{font-size:34px;font-weight:800;margin:6px 0;}
  .verdict .why{font-size:15px;opacity:.95;line-height:1.6;max-width:520px;margin:0 auto;}
  .scorebar{display:flex;gap:10px;margin:18px 0;}
  .sc{flex:1;background:#f1f5f9;border-radius:14px;padding:14px;text-align:center;border:1px solid var(--line);}
  .sc.win{background:#eef2ff;border-color:#c7d2fe;}
  .sc .scname{font-size:13px;font-weight:700;color:var(--ink2);}
  .sc .scnum{font-size:24px;font-weight:800;color:var(--brand);}
  .sc .scnum.dim{color:#94a3b8;}
  .canvas{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:16px;}
  .canvas h3{font-size:17px;font-weight:800;margin:0 0 14px;}
  table.cv{width:100%;border-collapse:collapse;font-size:14px;}
  table.cv th{text-align:left;padding:10px 12px;border:1px solid var(--line);background:#f8fafc;font-weight:700;width:108px;color:var(--ink2);vertical-align:top;}
  table.cv td{padding:10px 12px;border:1px solid var(--line);vertical-align:top;}
  .pre{position:relative;background:#0f172a;color:#e2e8f0;border-radius:14px;padding:18px 20px;font-size:13.5px;line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-word;font-family:'JetBrains Mono',monospace;margin-top:8px;}
  .pre .c{color:#64748b;} .pre .k{color:#22d3ee;} .pre .s{color:#86efac;}
  .copybtn{position:absolute;top:10px;right:10px;background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:8px;font-size:12px;padding:5px 10px;cursor:pointer;font-family:'Pretendard';font-weight:600;}
  .copybtn.copied{background:#065f46;color:#d1fae5;}
  .oneliner{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:14px;padding:16px 18px;font-size:16px;font-weight:700;color:#065f46;line-height:1.5;}
  .note{background:#fffbeb;border:1px solid #fcd34d;border-radius:14px;padding:14px 16px;font-size:14px;color:#92400e;line-height:1.6;margin-top:14px;}
  .restart{display:block;margin:22px auto 0;background:#f1f5f9;color:#334155;}
  .section-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.06em;margin:20px 0 6px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="kicker">2차 · 자동화 기획 진단</span>
    <h1>만들기 전에, 먼저 기획합니다</h1>
    <p class="sub">코딩보다 중요한 건 <b>"무엇을 · 왜 · 누구를 위해"</b> 자동화할지 정하는 것.<br/>6개 질문에 답하면 당신에게 맞는 <b>자동화 방향</b>과 <b>기획서 초안</b>을 드려요.</p>
  </div>

  <div class="progress" id="progress"></div>

  <!-- 질문 영역 -->
  <div class="card" id="qcard"></div>

  <!-- 결과 영역 -->
  <div id="result" class="hidden"></div>
</div>

<script>
// ---- 질문 정의: 각 옵션은 트랙 가중치(a/b)와 기획서 채움값(fill)을 가진다 ----
const QUESTIONS = [
  {
    key:'why', tag:'WHY · 왜 하는가',
    q:'이 자동화로 가장 줄이고 싶은 건 뭐예요?',
    hint:'자동화의 "목적"을 먼저 정합니다.',
    opts:[
      {e:'⏳', t:'반복에 쓰는 시간', d:'매번 30분~1시간씩 잡아먹는 일', a:1,b:1, fill:'반복 작업에 드는 시간 절약'},
      {e:'🎯', t:'사람이 내는 실수', d:'빠뜨림·오타·숫자 틀림', a:1,b:0, fill:'수작업에서 생기는 실수 방지'},
      {e:'😮‍💨', t:'지겨운 반복 스트레스', d:'똑같은 걸 또 하는 피로', a:1,b:1, fill:'단순 반복 업무의 스트레스 제거'},
      {e:'🔎', t:'놓치는 정보', d:'챙겨야 하는데 자꾸 빠지는 것', a:1,b:1, fill:'중요 정보 누락 방지'},
    ]
  },
  {
    key:'who', tag:'WHO · 누구를 위해',
    q:'그 결과물을 주로 누가 보나요?',
    hint:'보는 사람이 달라지면 형식이 달라집니다.',
    opts:[
      {e:'🙋', t:'나만 본다', d:'개인 정리·기록용', a:0,b:2, fill:'나 자신(개인 모니터링·정리)'},
      {e:'👥', t:'팀·상사에게 보고', d:'주간보고·업무현황 공유', a:3,b:0, fill:'팀/상사 (보고용)'},
      {e:'🤝', t:'타부서·고객', d:'외부에 전달하는 결과물', a:2,b:1, fill:'타부서/고객 (전달용)'},
      {e:'🗂️', t:'바로 보진 않음', d:'쌓아두는 기록·로그', a:0,b:2, fill:'아카이브(즉시 보지 않는 기록)'},
    ]
  },
  {
    key:'input', tag:'WHAT · 입력(재료)',
    q:'매번 다루는 "재료"는 주로 어떤 형태죠?',
    hint:'자동화가 읽어들일 데이터입니다.',
    opts:[
      {e:'📊', t:'엑셀·표·숫자', d:'매출, 명단, 지표 같은 표 데이터', a:0,b:3, fill:'엑셀/표/숫자 데이터'},
      {e:'📝', t:'텍스트·메모·메일', d:'글로 된 자료', a:2,b:0, fill:'텍스트/메모/메일'},
      {e:'🎙️', t:'회의 기록·녹취', d:'회의 내용, 통화 메모', a:3,b:0, fill:'회의 기록/녹취'},
      {e:'🧩', t:'여기저기 흩어진 정보', d:'파일·메신저·웹에 분산', a:1,b:1, fill:'여러 곳에 흩어진 정보'},
    ]
  },
  {
    key:'output', tag:'WHAT · 출력(결과물)',
    q:'결과물을 어떤 모습으로 받고 싶어요?',
    hint:'가장 중요한 질문 — 여기서 방향이 갈립니다.',
    opts:[
      {e:'📄', t:'보고서·문서', d:'정리된 글 문서(.md/한글 등)', a:2,b:0, fill:'보고서/문서'},
      {e:'✅', t:'Notion 페이지·할 일', d:'페이지 작성, 할 일 등록', a:4,b:0, fill:'Notion 페이지/할 일'},
      {e:'📈', t:'표·차트·대시보드', d:'한눈에 보는 현황판', a:0,b:4, fill:'표/차트/대시보드'},
      {e:'✉️', t:'이메일', d:'개인화 메일 발송', a:2,b:1, fill:'이메일'},
    ]
  },
  {
    key:'freq', tag:'HOW · 언제',
    q:'얼마나 자주 일어나는 일이에요?',
    hint:'빈도가 자동화 수준을 정합니다.',
    opts:[
      {e:'🌅', t:'매일', d:'아침마다 / 하루 단위', a:1,b:1, fill:'매일', lv3:2},
      {e:'📅', t:'매주', d:'주 1회 (예: 월요일 보고)', a:1,b:1, fill:'매주', lv3:2},
      {e:'🎲', t:'가끔·비정기', d:'필요할 때마다', a:1,b:1, fill:'비정기(필요 시)', lv3:0},
      {e:'⚡', t:'무언가 생기면', d:'파일 들어오면 / 메일 오면', a:1,b:1, fill:'이벤트 발생 시(파일 도착 등)', lv3:1},
    ]
  },
  {
    key:'level', tag:'HOW · 어디까지',
    q:'어디까지 자동화하고 싶어요?',
    hint:'오늘 목표 수준. 둘 다 도전할 수도 있어요.',
    opts:[
      {e:'⌨️', t:'한 줄로 실행 (Lv2)', d:'내가 명령하면 1초 만에 처리', a:0,b:0, fill:'Lv2 — 한 줄 명령 실행', level:'Lv2'},
      {e:'🤖', t:'예약 무인 (Lv3)', d:'안 시켜도 정해진 시간에 알아서', a:0,b:0, fill:'Lv3 — 예약 무인 실행', level:'Lv3'},
    ]
  },
];

const answers = {};
let cur = 0;

const progressEl = document.getElementById('progress');
const qcard = document.getElementById('qcard');
const resultEl = document.getElementById('result');

function renderProgress(){
  progressEl.innerHTML = '';
  for(let i=0;i<QUESTIONS.length;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i<cur?' done':'') + (i===cur?' cur':'');
    progressEl.appendChild(d);
  }
}

function renderQuestion(){
  resultEl.classList.add('hidden');
  qcard.classList.remove('hidden');
  renderProgress();
  const Q = QUESTIONS[cur];
  let html = `<div class="qnum">질문 ${cur+1} / ${QUESTIONS.length} · ${Q.tag}</div>
    <div class="qtitle">${Q.q}</div>
    <div class="qhint">${Q.hint}</div>
    <div class="opts">`;
  Q.opts.forEach((o,i)=>{
    const sel = answers[Q.key] && answers[Q.key].t===o.t ? 'style="border-color:var(--brand);background:#eef2ff;"' : '';
    html += `<button class="opt" ${sel} data-i="${i}">
      <span class="emoji">${o.e}</span>
      <span><span class="otext">${o.t}</span><span class="odesc">${o.d}</span></span>
    </button>`;
  });
  html += `</div>
    <div class="navrow">
      <button class="btn btn-ghost" id="back" ${cur===0?'disabled':''}>← 이전</button>
      <span class="qhint" style="margin:0;">선택하면 다음으로 넘어가요</span>
    </div>`;
  qcard.innerHTML = html;
  qcard.querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click', ()=>{
      answers[Q.key] = Q.opts[parseInt(b.dataset.i)];
      if(cur < QUESTIONS.length-1){ cur++; renderQuestion(); }
      else { renderResult(); }
    });
  });
  const back = document.getElementById('back');
  if(back) back.addEventListener('click', ()=>{ if(cur>0){cur--;renderQuestion();} });
}

function renderResult(){
  qcard.classList.add('hidden');
  resultEl.classList.remove('hidden');
  progressEl.innerHTML = '';

  // 점수 합산
  let a=0,b=0,lv3=0;
  Object.values(answers).forEach(o=>{ a+=o.a||0; b+=o.b||0; lv3+=o.lv3||0; });
  const trackA = a>=b;  // 동점이면 출력(Q4) 기준 이미 가중치 반영됨 → A 우선
  const track = trackA ? 'A' : 'B';
  const trackName = trackA ? '트랙 A · Notion 자동화' : '트랙 B · 대시보드 자동화';
  const why = trackA
    ? '당신의 답변은 <b>"정리한 결과를 사람에게 전달/보고"</b>하는 일에 가깝습니다. Notion 페이지·할 일로 떨어지는 자동화가 가장 잘 맞아요.'
    : '당신의 답변은 <b>"데이터를 한눈에 보는 현황판"</b>에 가깝습니다. 표·차트로 자동 갱신되는 대시보드가 가장 잘 맞아요.';

  const level = answers.level ? answers.level.level : 'Lv2';
  const wantLv3 = level==='Lv3' || lv3>=2;

  // 한 줄 정의 조합
  const oneliner = `${answers.freq?answers.freq.fill:'필요할 때'} ${answers.input?answers.input.fill:'내 자료'}를(을) 정리해서 ${answers.output?answers.output.fill:'결과물'}(으)로 만드는 자동화`;

  // CLAUDE.md 시작 템플릿 (트랙별)
  const claudemd = trackA ? `<span class="c"># 내 자동화 규칙 (Notion)</span>
<span class="k">## WHAT</span>: ${oneliner}
<span class="k">## WHO </span>: ${answers.who?answers.who.fill:''} 가 본다
<span class="k">## 입력</span>: ./내자료 (메모/엑셀 등)
<span class="k">## 양식</span>: 1)한 일 2)계획 3)이슈 — 각 3줄, 존댓말
<span class="k">## 끝나면</span>: Notion '○○' 데이터베이스에 항목으로 등록`
  : `<span class="c"># 내 자동화 규칙 (대시보드)</span>
<span class="k">## WHAT</span>: ${oneliner}
<span class="k">## WHO </span>: ${answers.who?answers.who.fill:''} 가 본다
<span class="k">## 입력</span>: ./데이터.xlsx
<span class="k">## 출력</span>: dashboard.html (표 + 핵심지표 카드 + 차트)
<span class="k">## 규칙</span>: 숫자는 천단위 콤마, 최신 데이터 기준 자동 갱신`;

  resultEl.innerHTML = `
    <div class="verdict">
      <div class="tracklabel">당신에게 추천하는 방향</div>
      <div class="trackname">${trackName}</div>
      <div class="why">${why}</div>
    </div>

    <div class="scorebar">
      <div class="sc ${trackA?'win':''}"><div class="scname">트랙 A · Notion</div><div class="scnum ${trackA?'':'dim'}">${a}점</div></div>
      <div class="sc ${trackA?'':'win'}"><div class="scname">트랙 B · 대시보드</div><div class="scnum ${trackA?'dim':''}">${b}점</div></div>
    </div>
    <p class="qhint" style="text-align:center;margin-top:-4px;">점수가 비슷하면 둘 다 가능해요. 마음 가는 쪽으로 골라도 됩니다.</p>

    <div class="section-label">📌 내 자동화 한 줄 정의</div>
    <div class="oneliner">"${oneliner}"<br/><span style="font-weight:600;font-size:14px;opacity:.8;">목표 수준: ${wantLv3?'Lv3 (예약 무인) 도전 — 안 되면 Lv2가 졸업선':'Lv2 (한 줄 실행)'}</span></div>

    <div class="canvas" style="margin-top:16px;">
      <h3>🗂️ 자동화 기획서 (자동 완성)</h3>
      <table class="cv">
        <tr><th>WHY 왜</th><td>${answers.why?answers.why.fill:''}</td></tr>
        <tr><th>WHO 누구</th><td>${answers.who?answers.who.fill:''}</td></tr>
        <tr><th>입력</th><td>${answers.input?answers.input.fill:''}</td></tr>
        <tr><th>처리</th><td>Claude가 정리/변환/작성 (워크북 STEP 2에서 규칙으로 박음)</td></tr>
        <tr><th>출력</th><td>${answers.output?answers.output.fill:''}</td></tr>
        <tr><th>트리거</th><td>${answers.freq?answers.freq.fill:''}</td></tr>
        <tr><th>수준</th><td>${level}${wantLv3?' (예약 무인 도전)':''}</td></tr>
      </table>
    </div>

    <div class="canvas">
      <h3>🚀 바로 쓸 CLAUDE.md 시작 템플릿</h3>
      <p class="qhint" style="margin-top:-6px;">워크북 STEP 2에서 이 틀에 빈칸만 채우면 됩니다.</p>
      <div class="pre" id="cmd">${claudemd}</div>
    </div>

    <div class="note">💡 이 결과를 캡처하거나 복사해서 워크북 <b>STEP 2 (공통 레일)</b> 로 가세요. 같은 트랙끼리 모여 앉으면 서로 도와주기 좋아요.</div>

    <button class="btn restart" id="restart">↻ 다시 진단하기</button>
  `;

  // 복사 버튼
  const pre = document.getElementById('cmd');
  const cb = document.createElement('button');
  cb.className='copybtn'; cb.textContent='📋 복사';
  cb.addEventListener('click', async ()=>{
    try{ await navigator.clipboard.writeText(pre.innerText.replace('📋 복사','').trim());
      cb.textContent='✅ 복사됨'; cb.classList.add('copied');
      setTimeout(()=>{cb.textContent='📋 복사';cb.classList.remove('copied');},1500);
    }catch(e){ cb.textContent='❌'; }
  });
  pre.appendChild(cb);

  document.getElementById('restart').addEventListener('click', ()=>{
    cur=0; for(const k in answers) delete answers[k]; renderQuestion();
  });
}

renderQuestion();
</script>
</body>
</html>
