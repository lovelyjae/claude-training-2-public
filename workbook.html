<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>실습 워크북 · Claude Code 2차 교육</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f172a; --ink2:#1e293b; --muted:#64748b; --line:#e2e8f0;
    --brand:#4f46e5; --brand2:#7c3aed; --accent:#06b6d4;
    --ok:#10b981; --warn:#f59e0b; --bad:#ef4444; --bg:#f8fafc;
    --track:var(--brand); --track2:var(--brand2);
  }
  body.track-b{ --track:#0891b2; --track2:#06b6d4; }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;font-family:'Pretendard',system-ui,-apple-system,sans-serif;color:var(--ink);background:linear-gradient(160deg,#eef2ff,#f8fafc 40%,#ecfeff);min-height:100%;}
  .mono,code{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}
  .wrap{max-width:820px;margin:0 auto;padding:24px 20px 100px;}

  /* top bar */
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-weight:700;font-size:14px;}
  .back:hover{color:var(--ink);}
  .trackpill{display:inline-block;background:var(--track);color:#fff;font-weight:800;font-size:13px;padding:6px 16px;border-radius:999px;letter-spacing:.01em;}
  .barbtns{display:flex;gap:8px;}
  .barbtn{font:inherit;font-weight:700;font-size:13px;border:1px solid var(--line);background:#fff;color:var(--ink2);border-radius:10px;padding:8px 14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
  .barbtn:hover{border-color:var(--track);color:var(--track);}

  /* doc card */
  .doc{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 30px 80px -50px rgba(15,23,42,.4);padding:40px 44px;}
  .doc>*:first-child{margin-top:0;}
  .doc h1{font-size:28px;font-weight:800;letter-spacing:-0.02em;line-height:1.25;margin:0 0 6px;}
  .doc h1+h2{margin-top:0;border:none;padding:0;color:var(--track);font-size:20px;}
  .doc h2{font-size:20px;font-weight:800;letter-spacing:-0.01em;margin:34px 0 12px;padding-top:18px;border-top:2px solid var(--line);line-height:1.3;}
  .doc h3{font-size:16px;font-weight:800;margin:22px 0 8px;color:var(--ink2);}
  .doc p{font-size:15.5px;line-height:1.75;margin:10px 0;}
  .doc ul,.doc ol{padding-left:22px;margin:10px 0;}
  .doc li{font-size:15.5px;line-height:1.7;margin:5px 0;}
  .doc a{color:var(--track);font-weight:700;}
  .doc strong{font-weight:800;}
  .doc hr{border:none;border-top:1px dashed var(--line);margin:26px 0;}

  /* blockquote */
  .doc blockquote{margin:14px 0;padding:14px 18px;background:#f8fafc;border-left:4px solid var(--track);border-radius:0 12px 12px 0;color:var(--ink2);}
  .doc blockquote p{margin:4px 0;font-size:14.5px;}

  /* inline + block code */
  .doc code{background:#eef2ff;color:#4338ca;padding:2px 7px;border-radius:6px;font-size:13.5px;font-weight:600;}
  .doc pre{position:relative;background:#0f172a;border-radius:14px;padding:18px 20px;overflow-x:auto;margin:8px 0 18px;}
  .doc pre code{display:block;background:none;color:#e2e8f0;padding:0;font-size:13.5px;line-height:1.7;font-weight:400;white-space:pre;}
  .copybtn{position:absolute;top:9px;right:9px;background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:8px;font-size:12px;padding:5px 10px;cursor:pointer;font-family:'Pretendard';font-weight:600;}
  .copybtn.copied{background:#065f46;color:#d1fae5;}

  /* tables */
  .doc table{width:100%;border-collapse:collapse;font-size:14px;margin:14px 0;display:block;overflow-x:auto;}
  .doc th{text-align:left;padding:10px 12px;border:1px solid var(--line);background:#f8fafc;font-weight:800;color:var(--ink2);}
  .doc td{padding:10px 12px;border:1px solid var(--line);vertical-align:top;line-height:1.6;}

  /* task list checkboxes */
  .doc li input[type=checkbox]{width:16px;height:16px;margin-right:8px;accent-color:var(--track);vertical-align:-2px;}
  .doc ul:has(>li>input){list-style:none;padding-left:4px;}

  .state{text-align:center;color:var(--muted);padding:60px 20px;font-size:15px;}
  .state.err{color:var(--bad);}

  @media (max-width:640px){ .doc{padding:28px 20px;border-radius:18px;} .doc h1{font-size:24px;} }
  @media print{
    body{background:#fff;} .wrap{padding:0;max-width:100%;}
    .bar{display:none;} .doc{box-shadow:none;border:none;border-radius:0;padding:0;}
    .copybtn{display:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <a class="back" href="./survey.html">← 진단으로 돌아가기</a>
    <span class="trackpill" id="trackpill">워크북</span>
    <div class="barbtns">
      <a class="barbtn" id="otherlink" href="#">↔ 다른 트랙</a>
      <button class="barbtn" onclick="window.print()">🖨 인쇄/PDF</button>
    </div>
  </div>
  <div id="doc" class="doc"><div class="state">워크북을 불러오는 중…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
const TRACKS = {
  A: { name:'🅰️ 트랙 A · Notion', path:'2차실습/트랙A/워크북_트랙A.md' },
  B: { name:'🅱️ 트랙 B · 대시보드', path:'2차실습/트랙B/워크북_트랙B.md' },
};

const params = new URLSearchParams(location.search);
let track = (params.get('track') || 'A').toUpperCase();
if(!TRACKS[track]) track = 'A';
const other = track === 'A' ? 'B' : 'A';

const docEl = document.getElementById('doc');
document.body.classList.toggle('track-b', track === 'B');
document.getElementById('trackpill').textContent = TRACKS[track].name;
const otherLink = document.getElementById('otherlink');
otherLink.href = `?track=${other}`;
otherLink.textContent = `↔ ${TRACKS[other].name} 보기`;

marked.setOptions({ gfm:true, breaks:false });

fetch(encodeURI(TRACKS[track].path))
  .then(r => { if(!r.ok) throw new Error(r.status); return r.text(); })
  .then(md => {
    docEl.innerHTML = marked.parse(md);
    document.title = `${TRACKS[track].name} 워크북 · Claude Code 2차`;
    addCopyButtons();
  })
  .catch(err => {
    docEl.innerHTML = `<div class="state err">워크북을 불러오지 못했어요 (${err.message}).<br/>
      파일 경로를 확인하거나 <a href="./survey.html">진단</a>으로 돌아가세요.</div>`;
  });

function addCopyButtons(){
  docEl.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copybtn'; btn.textContent = '📋 복사';
    btn.addEventListener('click', async () => {
      try{
        await navigator.clipboard.writeText(pre.querySelector('code').innerText);
        btn.textContent = '✅ 복사됨'; btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='📋 복사'; btn.classList.remove('copied'); }, 1500);
      }catch(e){ btn.textContent='❌'; }
    });
    pre.appendChild(btn);
  });
}
</script>
</body>
</html>
